name: 1-Hour Karing Smart Mobile Sync

on:
  schedule:
    - cron: '0 * * * *' # Раз в час, ровно в 00 минут
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Даем роботу официальные права на запись файлов!

jobs:
  sync-sort-karing:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Подключаем системный токен безопасности

      - name: Скачиваем ТОП-150 мобильных прокси у igareck
        run: |
          curl -s "https://githubusercontent.com" -o BLACK_VLESS_RUS_mobile.txt || touch BLACK_VLESS_RUS_mobile.txt

      - name: Замер скорости и жесткая сортировка наверх
        run: |
          touch temp_raw.txt
          cat BLACK_VLESS_RUS_mobile.txt > temp_raw.txt 2>/dev/null || true
          cat temp_raw.txt | grep -E '^([a-zA-Z0-9_-]+)://' > karing_nodes.txt || touch karing_nodes.txt
          
          touch timed_nodes.txt
          if [ -s karing_nodes.txt ]; then
            while read -r line; do
              if [[ "$line" =~ @([^:]+):([0-9]+) ]]; then
                host="${BASH_REMATCH[1]}"
                port="${BASH_REMATCH[2]}"
                start_time=$(date +%s%N)
                if nc -z -w 2 "$host" "$port" 2>/dev/null; then
                  end_time=$(date +%s%N)
                  ping_ms=$(( (end_time - start_time) / 1000000 ))
                  echo "$ping_ms $line" >> timed_nodes.txt
                else
                  echo "9999 $line" >> timed_nodes.txt
                fi
              fi
            done < karing_nodes.txt
          fi

          if [ -s timed_nodes.txt ]; then
            sort -n timed_nodes.txt | cut -d' ' -f2- > karing_final.txt
          else
            cat karing_nodes.txt > karing_final.txt
          fi

      - name: Жесткое принудительное сохранение файлов на сайт
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add karing_final.txt BLACK_VLESS_RUS_mobile.txt
          # Разрешаем коммит, даже если список серверов остался прежним
          git commit -m "Принудительное обновление прокси VLESS" --allow-empty
          git push origin main
