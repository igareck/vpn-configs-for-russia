name: 2-Hour Karing Sync

on:
  schedule:
    - cron: '0 */2 * * *' # Автоматический запуск каждые 2 часа
  workflow_dispatch: # Кнопка для ручного запуска в любое время

permissions:
  contents: write

jobs:
  merge-proxies:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем репозиторий
        uses: actions/checkout@v4

      - name: Объединяем и очищаем прокси
        run: |
          # Создаем пустой временный файл
          > temp_proxies.txt
          
          # Проверяем наличие первого файла и добавляем его содержимое
          if [ -f "BLACK_SS+All_RUS.txt" ]; then
            cat "BLACK_SS+All_RUS.txt" >> temp_proxies.txt
          fi
          
          # Проверяем наличие второго файла и добавляем его содержимое
          if [ -f "BLACK_VLESS_RUS.txt" ]; then
            cat "BLACK_VLESS_RUS.txt" >> temp_proxies.txt
          fi
          
          # Очищаем список: оставляем только строки с прокси-протоколами
          if [ -s temp_proxies.txt ]; then
            cat temp_proxies.txt | grep -E '^([a-zA-Z0-9_-]+)://' > karing_final.txt
            echo "Файлы объединены. Создан karing_final.txt"
          else
            echo "Ошибка: Исходные файлы не найдены или они пустые!"
            exit 1
          fi

      - name: Сохраняем изменения в твой репозиторий
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add karing_final.txt
          git commit -m "Синхронизация прокси каждые 2 часа [skip ci]" || echo "Новых прокси нет"
          git push
