name: 2-Hour Happ Smart Sync

on:
  schedule:
    - cron: '30 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-and-encode:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем репозиторий
        uses: actions/checkout@v4

      - name: Объединяем, настраиваем автовыбор и кодируем в Base64
        run: |
          > temp_happ.txt
          cat *BLACK*.txt >> temp_happ.txt 2>/dev/null || true
          cat *VLESS*.txt >> temp_happ.txt 2>/dev/null || true
          cat *SS*.txt >> temp_happ.txt 2>/dev/null || true
          
          # Очищаем список от мусора
          cat temp_happ.txt | grep -E '^([a-zA-Z0-9_-]+)://' > clean_nodes.txt
          
          if [ -s clean_nodes.txt ]; then
            # СОЗДАЕМ УМНЫЙ ХЕДЕР ДЛЯ HAPP
            # Этот блок заставляет Happ автоматически тестировать прокси каждые 180 секунд 
            # и переключаться на живые сервера на лету без твоего участия
            echo "#profile-title: Авто-прокси (Умный выбор)" > final_profile.txt
            echo "#profile-update-interval: 2" >> final_profile.txt
            echo "#auto-policy: url-test" >> final_profile.txt
            echo "#auto-url: http://gstatic.com" >> final_profile.txt
            echo "#auto-interval: 180" >> final_profile.txt
            
            # Добавляем сами прокси-адреса
            cat clean_nodes.txt >> final_profile.txt
            
            # Кодируем всё в Base64 для Happ
            base64 -w 0 final_profile.txt > happ_final.txt
            echo "Умный профиль для Happ успешно создан!"
          else
            echo "Ошибка: файлы пусты"
            exit 1
          fi

      - name: Сохраняем изменения в репозиторий
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add happ_final.txt
          git commit -m "Синхронизация смарт-прокси для Happ [skip ci]" || echo "Изменений нет"
          git push
