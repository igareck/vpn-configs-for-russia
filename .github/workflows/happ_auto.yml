name: 30-Min Happ Mobile Proxy Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4

      - name: Скачиваем мобильные прокси у igareck
        run: |
          curl -s "https://githubusercontent.com" -o BLACK_VLESS_RUS_mobile.txt || true

      - name: Сборка Base64 и принудительное отключение сбойного модуля
        run: |
          > temp_raw.txt
          cat BLACK_VLESS_RUS_mobile.txt >> temp_raw.txt 2>/dev/null || true
          
          # Чистим от мусора
          cat temp_raw.txt | grep -E '^([a-zA-Z0-9_-]+)://' > happ_nodes.txt
          
          if [ -s happ_nodes.txt ]; then
            # ДОБАВЛЯЕМ СПЕЦИАЛЬНУЮ СИСТЕМНУЮ ДИРЕКТИВУ ДЛЯ HAPP
            # Эта строчка жестко говорит приложению: "Отключи встроенную маршрутизацию и не лезь на happ.su"
            echo "#routing-enable: 0" > final_profile.txt
            cat happ_nodes.txt >> final_profile.txt
            
            # Пакуем в Base64 для Happ
            base64 -w 0 final_profile.txt > happ_final.txt
            echo "Блокировка ошибок happ.su успешно внедрена в файл!"
          else
            echo "Ошибка скачивания"
            exit 1
          fi

      - name: Сохраняем в твой репозиторий
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add BLACK_VLESS_RUS_mobile.txt happ_final.txt
          git commit -m "Принудительное отключение сбойного роутинга [skip ci]" || echo "Изменений нет"
          git push
