name: 30-Min Happ Mobile Proxy Sync

on:
  schedule:
    - cron: '*/30 * * * *' # Каждые 30 минут
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4

      - name: Скачиваем ТОП-150 мобильных прокси у igareck
        run: |
          # Качаем облегченный и самый живучий список для телефонов
          curl -s "https://githubusercontent.com" -o BLACK_VLESS_RUS_mobile.txt || true

      - name: Сборка Base64 без удаления скрытых серверов
        run: |
          > temp_raw.txt
          cat BLACK_VLESS_RUS_mobile.txt >> temp_raw.txt 2>/dev/null || true
          
          # Очищаем только от пустых строк
          cat temp_raw.txt | grep -E '^([a-zA-Z0-9_-]+)://' > happ_nodes.txt
          
          if [ -s happ_nodes.txt ]; then
            base64 -w 0 happ_nodes.txt > happ_final.txt
            echo "Мобильный список успешно обновлен!"
          else
            echo "Ошибка скачивания"
            exit 1
          fi

      - name: Сохраняем в твой репозиторий
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add BLACK_VLESS_RUS_mobile.txt happ_final.txt
          git commit -m "Синхронизация мобильных прокси [skip ci]" || echo "Изменений нет"
          git push
