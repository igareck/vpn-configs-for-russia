name: 30-Min Happ Ultra-Light Sync

on:
  schedule:
    - cron: '*/30 * * * *' # Каждые 30 минут
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-top-15:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4

      - name: Скачиваем мобильные прокси у igareck
        run: |
          curl -s "https://githubusercontent.com" -o BLACK_VLESS_RUS_mobile.txt || true

      - name: Отбор ТОП-15 самых быстрых серверов
        run: |
          > temp_raw.txt
          cat BLACK_VLESS_RUS_mobile.txt >> temp_raw.txt 2>/dev/null || true
          cat temp_raw.txt | grep -E '^([a-zA-Z0-9_-]+)://' > happ_nodes.txt
          
          > timed_nodes.txt
          
          # Быстрый пинг каждого порта
          while read -r line; do
            if [[ "$line" =~ @([^:]+):([0-9]+) ]]; then
              host="${BASH_REMATCH}"
              port="${BASH_REMATCH}"
              
              start_time=$(date +%s%N)
              if nc -z -w 2 "$host" "$port" 2>/dev/null; then
                end_time=$(date +%s%N)
                ping_ms=$(( (end_time - start_time) / 1000000 ))
                echo "$ping_ms $line" >> timed_nodes.txt
              fi
            fi
          done < happ_nodes.txt

          > final_top15.txt
          if [ -s timed_nodes.txt ]; then
            # Сортируем по скорости и ЖЁСТКО ОТБИРАЕМ ТОЛЬКО ПЕРВЫЕ 15 ШТУК (head -n 15)
            sort -n timed_nodes.txt | head -n 15 | cut -d' ' -f2- > final_top15.txt
            base64 -w 0 final_top15.txt > happ_final.txt
            echo "Отбор завершен. В списке оставлено только 15 лучших прокси!"
          else
            # Если робот лег, оставляем первые 15 из оригинального файла
            head -n 15 happ_nodes.txt | base64 -w 0 > happ_final.txt
          fi

      - name: Сохраняем изменения
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add BLACK_VLESS_RUS_mobile.txt happ_final.txt
          git commit -m "Оставили только ТОП-15 лучших прокси [skip ci]" || echo "Изменений нет"
          git push
